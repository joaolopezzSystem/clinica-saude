<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>JG - Clínica de Saúde</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  
</head>
<body class="bg-light">

<div class="container mt-5">
  <h1 class="text-center mb-4">JG - Clínica de Saúde</h1>

  <div class="card p-4 mb-4">
    <h3 class="mb-3">Agendar Consulta</h3>

    <label>Nome</label>
    <input class="form-control mb-2" id="nome">
    <label>CPF</label>
    <input class="form-control mb-2" id="cpf" oninput="apenasNumeros(this)">

    
    <select class="form-control mb-2" id="especialidade"></select>
    <select class="form-control mb-2" id="profissional"></select>
    <select class="form-control mb-2" id="data"></select>
    <select class="form-control mb-2" id="hora"></select>


    <button class="btn btn-primary" onclick="agendar()">Agendar</button>
  </div>

  <div class="card p-4 mb-4">
    <h3 class="mb-3">Consultar Agendamento</h3>

    <input class="form-control mb-2" id="cpfConsulta" placeholder="CPF" oninput="apenasNumeros(this)">
    <button class="btn btn-success" onclick="consultar()">Consultar</button>

    <ul class="mt-3" id="resultado"></ul>
  </div>

  <div class="card p-4">
    <h3 class="mb-3">Cancelar Agendamento</h3>

    <input class="form-control mb-2" id="cpfCancelar" placeholder="CPF" oninput="apenasNumeros(this)">
    <button class="btn btn-danger" onclick="cancelar()">Cancelar</button>
  </div>

</div>

<script src="js/script.js"></script>

</body>
</html>
